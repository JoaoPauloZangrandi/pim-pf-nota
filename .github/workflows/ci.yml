# ci.yml — lint + testes em cada PR e push na main.
# Os testes são desenhados para NÃO precisar de rede nem de TeX (cliente e compilador são
# injetáveis/falsos no smoke test), então o CI roda rápido e determinístico.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-e-testes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (formatação)
        run: black --check .

      - name: Pytest
        run: pytest -q
